<!DOCTYPE html>
<html>
<head>
<title>Fund Wallet</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://js.paystack.co/v1/inline.js"></script>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:40px;
}

.container{
background:white;
padding:30px;
border-radius:10px;
width:300px;
margin:auto;
}

input{
width:100%;
padding:10px;
margin-top:10px;
}

button{
background:#28a745;
color:white;
border:none;
padding:12px;
margin-top:10px;
width:100%;
}
</style>
</head>

<body>

<div class="container">

<h2>Fund Wallet</h2>

<input type="email" id="email" placeholder="Enter email">

<input type="number" id="amount" placeholder="Amount (NGN)">

<button onclick="payWithPaystack()">Pay Now</button>

</div>

<script>

function payWithPaystack(){

let email = document.getElementById("email").value;
let amount = document.getElementById("amount").value * 100;

let handler = PaystackPop.setup({

key: "pk_test_b32722797326e5852d2f7578d9bfb90159d0e677",

email: email,

amount: amount,

currency: "NGN",

callback: function(response){

verifyPayment(response.reference)

},

onClose: function(){

alert("Payment cancelled");

}

});

handler.openIframe();

}

function verifyPayment(reference){

fetch("http://localhost:3000/verify-payment",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify({
reference: reference
})

})

.then(res => res.json())

.then(data => {

alert("Wallet funded successfully")

})

}

</script>

</body>
</html>
