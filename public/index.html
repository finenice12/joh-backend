<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Fintech</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

<h2>My Fintech</h2>

<button onclick="logout()">Logout</button>

</div>

<div class="container">

<h3>Welcome, <span id="userEmail"></span></h3>

<div class="card">

<h3>Wallet Balance</h3>

<div class="balance" id="balance">₦0.00</div>

<input id="amount" placeholder="Enter amount">

<button onclick="fundWallet()">Fund Wallet</button>

</div>

<div class="card">

<h3>Buy Airtime</h3>

<input id="airtimePhone" placeholder="Phone number">
<input id="airtimeAmount" placeholder="Amount">

<button onclick="buyAirtime()">Buy Airtime</button>

</div>

<div class="card">

<h3>Buy Data</h3>

<input id="dataPhone" placeholder="Phone number">

<select id="dataPlan">
<option value="500MB">500MB</option>
<option value="1GB">1GB</option>
<option value="2GB">2GB</option>
</select>

<button onclick="buyData()">Buy Data</button>

</div>

</div>

<script src="https://checkout.flutterwave.com/v3.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
