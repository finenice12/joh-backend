<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background: #f5f5f5;
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
    }
    h1 {
      font-size: 8rem;
      margin: 0;
      color: #ffa100;
    }
    h2 {
      font-size: 2rem;
      margin: 0 0 20px;
    }
    p {
      font-size: 1rem;
      margin: 0 0 30px;
      line-height: 1.5;
    }
    a {
      text-decoration: none;
      background: #039be5;
      color: white;
      padding: 15px 30px;
      border-radius: 5px;
      font-weight: bold;
      transition: background 0.3s;
    }
    a:hover {
      background: #0288d1;
    }
    @media (max-width: 600px) {
      h1 { font-size: 5rem; }
      h2 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <h1>404</h1>
  <h2>Oops! Page Not Found</h2>
  <p>The page you’re looking for doesn’t exist or has been moved.</p>
  <a href="/">Go Back Home</a>
</body>
</html>
