<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Fintech Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h2>💰 My Fintech</h2>
    <p id="userEmail">Welcome, user@example.com</p>
    <button onclick="logout()" class="logout-btn">Logout</button>
  </header>

  <main>
    <!-- WALLET -->
    <div class="card">
      <h3>💵 Wallet Balance</h3>
      <p id="balance">₦0.00</p>
      <input type="number" id="amount" placeholder="Enter amount">
      <button onclick="fundWallet()">Fund Wallet</button>
    </div>

    <!-- BUY AIRTIME -->
    <div class="card">
      <h3>📱 Buy Airtime</h3>
      <button onclick="buyAirtime()">Buy Airtime</button>
    </div>

    <!-- BUY DATA -->
    <div class="card">
      <h3>📶 Buy Data</h3>
      <button onclick="buyData()">500MB</button>
      <button onclick="buyData()">1GB</button>
      <button onclick="buyData()">2GB</button>
    </div>

    <!-- TRANSACTIONS -->
    <div class="card">
      <h3>📝 Transactions</h3>
      <ul id="txList">
        <li>No transactions yet</li>
      </ul>
    </div>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
