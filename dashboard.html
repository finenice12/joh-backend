<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dashboard - Glory90</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
<h2>Glory90 Wallet</h2>
<p style="text-align:center;">Logged in as: <span id="userEmail"></span></p>
<p id="balance">₦0</p>

<button id="btnAdd" class="add">💰 Add Money</button>
<button id="btnAirtime" class="airtime">📱 Buy Airtime</button>
<button id="btnData" class="data">📶 Buy Data</button>
<button id="btnSend" class="send">📤 Send Money</button>
<button id="btnReceive" class="receive">💸 Receive Money</button>
<button id="btnLogout" class="logout">🚪 Logout</button>

<h3>Transaction History</h3>
<ul id="transactionHistory"></ul>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
