<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Fintech Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>My Fintech</h1>
    <button id="btnLogout">Logout</button>
  </header>

  <section id="wallet">
    <h2>Wallet Balance</h2>
    <p id="balance">₦0.00</p>
    <input type="number" id="amount" placeholder="Enter amount to fund">
    <button id="btnFund">Fund Wallet</button>
  </section>

  <section id="buy-airtime">
    <h2>Buy Airtime</h2>
    <button id="btnAirtime">Buy Airtime</button>
  </section>

  <section id="buy-data">
    <h2>Buy Data</h2>
    <button id="btnData">Buy Data</button>
  </section>

  <section id="transactions">
    <h2>Transactions</h2>
    <ul id="txList">
      <li>No transactions yet</li>
    </ul>
  </section>
<script type="module" src="app.js"></script>
<script type="module" src="dashboard.js"></script>
<script type="module" src="login.js"></script>
<script type="module" src="register.js"></script>
</body>
</html>
