<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard</title>
<div class="card">
<h3>Wallet Balance</h3>
<h1 id="balance">₦0.00</h1>
</div>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
<div class="card">

<h3>Quick Actions</h3>

<button onclick="openFund()">💰 Fund Wallet</button>

<button onclick="openAirtime()">📱 Buy Airtime</button>

<button onclick="openData()">📶 Buy Data</button>
<div class="card">

<h3>Recent Transactions</h3>

<ul id="transactions">

<li>No transactions yet</li>

</ul>

</div>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f4f6fb;
}

/* HEADER */

header{
background:white;
height:70px;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 30px;
box-shadow:0 2px 8px rgba(0,0,0,0.05);
}

header h2{
color:#1a73e8;
}

.user{
display:flex;
align-items:center;
gap:15px;
}

.logout{
background:#ff4d4d;
color:white;
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* LAYOUT */

.container{
display:flex;
}

/* SIDEBAR */

.sidebar{
width:240px;
background:#111827;
height:100vh;
padding-top:30px;
color:white;
}

.sidebar h3{
padding-left:20px;
margin-bottom:20px;
}

.sidebar a{
display:block;
padding:14px 20px;
color:white;
text-decoration:none;
transition:0.2s;
}

.sidebar a:hover{
background:#1f2937;
}

/* MAIN */

.main{
flex:1;
padding:30px;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-bottom:25px;
}

.card{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.card h4{
color:#666;
margin-bottom:10px;
}

.balance{
font-size:28px;
font-weight:600;
color:#16a34a;
}

/* FUND BUTTON */

.fund{
margin-top:10px;
background:#1a73e8;
color:white;
border:none;
padding:10px 16px;
border-radius:6px;
cursor:pointer;
}

/* ACTIVITY */

.activity{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

.activity h3{
margin-bottom:15px;
}

.activity p{
color:#777;
}

</style>
</head>

<body>

<header>

<h2>My Fintech</h2>

<div class="user">
<span id="userEmail"></span>
<button class="logout" id="btnLogout">Logout</button>
</div>

</header>

<div class="container">

<!-- SIDEBAR -->

<div class="sidebar">

<h3>Menu</h3>

<a href="#">🏠 Dashboard</a>
<a href="#">💰 Fund Wallet</a>
<a href="#">📜 Transactions</a>
<a href="#">📊 Analytics</a>
<a href="#">⚙ Settings</a>

</div>

<!-- MAIN -->

<div class="main">

<div class="cards">

<div class="card">
<h4>Wallet Balance</h4>
<div class="balance">₦0.00</div>
<button class="fund">Fund Wallet</button>
</div>

<div class="card">
<h4>Total Deposits</h4>
<div class="balance">₦0.00</div>
</div>

<div class="card">
<h4>Total Withdrawals</h4>
<div class="balance">₦0.00</div>
</div>

<div class="card">
<h4>Transactions</h4>
<div class="balance">0</div>
</div>

</div>

<div class="activity">

<h3>Recent Activity</h3>

<p>No transactions yet.</p>

</div>

</div>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
