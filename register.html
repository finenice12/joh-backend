<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Register - Glory90</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
<h2>Register</h2>
<p>Email: <input type="email" id="regEmail"></p>
<p>Password: <input type="password" id="regPass"></p>
<button id="btnRegister">📝 Register</button>
<p style="text-align:center;"><a href="login.html">Back to Login</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase.js"></script>
<script>
document.getElementById("btnRegister").addEventListener("click", async ()=>{
  let email=document.getElementById("regEmail").value;
  let pass=document.getElementById("regPass").value;
  try{
    let userCred=await auth.createUserWithEmailAndPassword(email,pass);
    await db.collection("users").doc(userCred.user.uid).set({email,balance:0});
    alert("Registered! Please login.");
    location="login.html";
  }catch(e){ alert(e.message); }
});
</script>
</body>
</html>
