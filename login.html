<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login - Glory90</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="card">
<h2>Login</h2>
<p>Email: <input type="email" id="loginEmail"></p>
<p>Password: <input type="password" id="loginPass"></p>
<button id="btnLogin">🔑 Login</button>
<p style="text-align:center;"><a href="register.html">Register</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
<script src="firebase.js"></script>
<script>
document.getElementById("btnLogin").addEventListener("click", async ()=>{
  let email=document.getElementById("loginEmail").value;
  let pass=document.getElementById("loginPass").value;
  try{ await auth.signInWithEmailAndPassword(email,pass); location="dashboard.html"; }
  catch(e){ alert(e.message); }
});
</script>
</body>
</html>
